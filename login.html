<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0"/>

  <title>Login - MindWell</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',Tahoma,sans-serif;
    }

    body{

      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;

      background:
      linear-gradient(
        135deg,
        #dfe9f3,
        #ffffff
      );
    }

    .login-container{

      width:400px;
      background:white;
      padding:35px;
      border-radius:20px;

      box-shadow:
      0 10px 25px rgba(0,0,0,0.1);

      animation:fadeIn 1s ease;
    }

    .logo{

      text-align:center;
      font-size:45px;
      margin-bottom:10px;
    }

    .login-container h2{

      text-align:center;
      margin-bottom:10px;
      color:#4a6d5a;
    }

    .subtitle{

      text-align:center;
      color:#666;
      margin-bottom:25px;
      font-size:14px;
    }

    .input-group{

      margin-bottom:18px;
    }

    .input-group label{

      display:block;
      margin-bottom:6px;
      color:#444;
      font-weight:500;
    }

    .input-group input{

      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
      font-size:15px;
      transition:0.3s;
    }

    .input-group input:focus{

      border-color:#4a90e2;

      box-shadow:
      0 0 8px rgba(74,144,226,0.3);
    }

    .login-btn{

      width:100%;
      padding:13px;

      background:
      linear-gradient(
        90deg,
        #4a90e2,
        #6ab04c
      );

      color:white;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;

      transition:0.3s;
    }

    .login-btn:hover{

      transform:scale(1.02);
      opacity:0.95;
    }

    .signup-text{

      text-align:center;
      margin-top:18px;
      color:#555;
    }

    .signup-text a{

      color:#4a90e2;
      text-decoration:none;
      font-weight:bold;
    }

    .quote{

      text-align:center;
      margin-top:20px;
      font-size:13px;
      color:#777;
      font-style:italic;
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

  </style>
</head>

<body>

<div class="login-container">

  <div class="logo">
    🌿
  </div>

  <h2>
    Welcome Back
  </h2>

  <p class="subtitle">
    Login to continue your healing journey 💙
  </p>

  <form id="loginForm">

    <div class="input-group">

      <label>
        Email Address
      </label>

      <input
        type="email"
        id="email"
        placeholder="Enter your email"
        required>

    </div>

    <div class="input-group">

      <label>
        Password
      </label>

      <input
        type="password"
        id="password"
        placeholder="Enter your password"
        required>

    </div>

    <button
      type="submit"
      class="login-btn">

      Login

    </button>

  </form>

  <div class="signup-text">

    Don't have an account?

    <a href="register.html">
      Register
    </a>

  </div>

  <div class="quote">

    “Every day is a fresh start 🌈”

  </div>

</div>

<script>

const loginForm =
document.getElementById(
  "loginForm"
);

loginForm.addEventListener(
  "submit",
  function(e){

    e.preventDefault();

    const email =
      document.getElementById(
        "email"
      ).value;

    const password =
      document.getElementById(
        "password"
      ).value;

    // Get saved user data

    const savedEmail =
      localStorage.getItem(
        "userEmail"
      );

    const savedPassword =
      localStorage.getItem(
        "userPassword"
      );

    // Check if user exists

    if(!savedEmail){

      alert(
        "Please register first"
      );

      return;
    }

    // Validate login

    if(
      email === savedEmail &&
      password === savedPassword
    ){

      alert(
        "Login Successful 💙"
      );

      // Redirect to dashboard

      window.location.href =
        "dashboard.html";
    }

    else{

      alert(
        "Invalid Email or Password"
      );
    }

});

</script>

</body>
</html>
