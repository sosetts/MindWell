<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>My Profile</title>

  <style>

    :root{

      --bg-color:#f8f7f2;
      --card-bg:#fffefb;
      --text-main:#2d3436;
      --accent-green:#96b3a2;
      --border-color:#e0e0e0;
      --shadow:0 4px 12px rgba(0,0,0,0.05);
    }

    *{

      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',Tahoma,sans-serif;
    }

    body{

      background:var(--bg-color);
      color:var(--text-main);
    }

    header{

      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 40px;
      background:var(--card-bg);
      border-bottom:1px solid var(--border-color);
      box-shadow:var(--shadow);
    }

    .logo{

      font-size:24px;
      font-weight:bold;
      color:var(--accent-green);
    }

    nav a{

      margin:0 12px;
      text-decoration:none;
      color:var(--text-main);
      font-weight:500;
    }

    nav a.active{

      background:var(--accent-green);
      color:white;
      padding:8px 15px;
      border-radius:8px;
    }

    .container{

      max-width:1000px;
      margin:40px auto;
      padding:20px;
    }

    .profile-card{

      background:var(--card-bg);
      border-radius:20px;
      padding:40px;
      box-shadow:var(--shadow);
      border:1px solid var(--border-color);
      text-align:center;

      animation:fadeIn 1s ease;
    }

    .profile-card img{

      width:150px;
      height:150px;
      border-radius:50%;
      object-fit:cover;
      margin-bottom:20px;
      border:5px solid var(--accent-green);
    }

    .profile-card h1{

      margin-bottom:10px;
      font-size:32px;
    }

    .profile-card p{

      margin-bottom:12px;
      color:#666;
      font-size:17px;
    }

    .welcome-text{

      margin-top:15px;
      font-size:18px;
      color:#4a6d5a;
      font-weight:bold;
    }

    .stats{

      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
      margin-top:35px;
    }

    .stat-box{

      background:#eef7f0;
      padding:25px;
      border-radius:15px;
      transition:0.3s;
    }

    .stat-box:hover{

      transform:translateY(-5px);
    }

    .stat-box h2{

      color:var(--accent-green);
      margin-bottom:10px;
      font-size:30px;
    }

    button{

      background:linear-gradient(
        90deg,
        #4a90e2,
        #6ab04c
      );

      color:white;
      border:none;
      padding:12px 24px;
      border-radius:10px;
      cursor:pointer;
      margin-top:25px;
      font-size:16px;
      transition:0.3s;
    }

    button:hover{

      transform:scale(1.03);
    }

    footer{

      text-align:center;
      padding:30px;
      opacity:0.7;
      margin-top:30px;
    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(20px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:768px){

      .stats{

        grid-template-columns:1fr;
      }

      header{

        flex-direction:column;
        gap:15px;
      }
    }

  </style>
</head>

<body>

<header>

  <div class="logo">
    🌿 MindWell
  </div>

  <nav>

    <a href="dashboard.html">
      Dashboard
    </a>

    <a href="journal.html">
      Journal
    </a>

    <a href="resources.html">
      Resources
    </a>

    <a href="therapist.html">
      Find Therapist
    </a>

    <a href="profile.html"
      class="active">

      Profile

    </a>

  </nav>

</header>

<div class="container">

  <div class="profile-card">

    <img
      src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
    >

    <h1 id="profileName">
      User Name
    </h1>

    <p id="profileEmail">
      📧 user@email.com
    </p>

    <p>
      🌍 India
    </p>

    <p>
      💙 Mental Wellness Journey
    </p>

    <div class="welcome-text"
      id="welcomeText">

      Welcome Back 💙

    </div>

    <button onclick="editProfile()">

      Edit Profile

    </button>

    <!-- Stats -->

    <div class="stats">

      <div class="stat-box">

        <h2>
          15
        </h2>

        <p>
          Journal Entries
        </p>

      </div>

      <div class="stat-box">

        <h2>
          8
        </h2>

        <p>
          Mood Check-ins
        </p>

      </div>

      <div class="stat-box">

        <h2>
          5
        </h2>

        <p>
          Therapy Sessions
        </p>

      </div>

    </div>

  </div>

</div>

<footer>

  💙 Your wellness journey matters.

</footer>

<script>

  // Get saved user data

  const userName =
    localStorage.getItem(
      "userName"
    );

  const userEmail =
    localStorage.getItem(
      "userEmail"
    );

  // Show data on profile

  if(userName){

    document.getElementById(
      "profileName"
    ).innerText = userName;

    document.getElementById(
      "welcomeText"
    ).innerText =
      "Welcome Back, " +
      userName +
      " 💙";
  }

  if(userEmail){

    document.getElementById(
      "profileEmail"
    ).innerText =
      "📧 " + userEmail;
  }

  // Edit button

  function editProfile(){

    alert(
      "Profile Edit Feature Coming Soon 💙"
    );
  }

</script>

</body>
</html>
